<!DOCTYPE html>
<html>

<head>
    <title>Clinic Queue</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
        }

        a {
            margin: 10px;
            text-decoration: none;
            color: white;
            background: #007BFF;
            padding: 10px;
            border-radius: 5px;
        }

        li {
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Clinic Queue</h1>

        <a href="/add">Add Patient</a>
        <a href="/serve">Serve Patient</a>

        <h2>Waiting List:</h2>
        <ul>
            {% for patient in patients %}
            <li>{{ patient.get_details() }}</li>
            {% endfor %}
        </ul>
        <h3>Patients Waiting: {{ patients|length }}</h3>
        <h3>Total Served Today: {{ total }}</h3>
    </div>

</body>

</html>
