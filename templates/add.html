<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: rgb(255, 255, 255);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #262f81;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #34479c;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Add Patient</h1>

        <form method="POST">
            <input type="text" name="name" placeholder="Enter name" required>
            <br>
            <button type="submit">Add</button>
        </form>

        <a href="/">← Back</a>
    </div>

</body>
</html>
