<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
            width: 320px;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        input {
            width: 85%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            outline: none;
            font-size: 14px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #00c9a7;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #00b894;
            transform: scale(1.05);
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #00c9a7;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .success {
            margin-top: 15px;
            color: #00ffae;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🩺 Add Patient</h1>

        <form method="POST">
            <input type="text" name="name" placeholder="Enter patient name" required>
            <br>
            <button type="submit">Add Patient</button>
        </form>

        <!-- Optional success message -->
        {% if success %}
            <div class="success">✅ Patient added successfully!</div>
        {% endif %}

        <a href="/">← Back</a>
    </div>

</body>
